<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="src/styles/style.css">
    <meta charset="UTF-8">

            </div>
                <div id="columna-derecha">

            </div>

            </div>

            <script src="/src/js/app.js"></script>
